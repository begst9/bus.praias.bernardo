<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placar Riachão</title>
</head>

<body style="background-color: blueviolet;">
    <h1>Placar Riachão</h1>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="placar.js">
<form>
    <div class="botao">
     <button 
     class="configuraçoes">Configurações
    </button>
   </div>

   <div class="placar1">
    <input type="file" accept="image/*" id="uploadImagem">
     <br><br>
    
    <!-- Tag onde a imagem será exibida -->
    <img id="imagemPreview" src="" alt="Sua imagem aparecerá aqui" style="max-width: 300px; display: none;">

    <script>
        const upload = document.getElementById('uploadImagem');
        const preview = document.getElementById('imagemPreview');

        upload.addEventListener('change', function(event) {
            const arquivo = event.target.files[0];

            if (arquivo) {
                const leitor = new FileReader();

                // Quando a leitura terminar, altera o src da imagem
                leitor.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block'; // Exibe a imagem
                }

                // Lê o arquivo como uma URL de dados
                leitor.readAsDataURL(arquivo);
            }
        });
    </script>
   </div>
   
   <div class="placar2">
    <input type="file" accept="image/*" onchange="exibirImagem">
   </div>

   <h1 class="time1" > <input type="text">
    <input type="number" min="0" max="1000" placeholder="0">
   </h1>

   <h1 class="contra"> 
         X
   </h1>

   <h1 class="time2"> <input type="text">
    <input type="number" min="0" max="1000" placeholder="0">
   </h1>

</form>
</body>
</html>
