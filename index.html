<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praia Bus - Viagens para Praias</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@400;500&display=swap');
        
        :root {
            --brown: #3C2F2F;
            --beige: #F5F0E8;
            --dark-brown: #2C211F;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--beige);
            color: var(--dark-brown);
            line-height: 1.6;
        }
        
        header {
            background-color: var(--brown);
            color: white;
            padding: 1rem 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
        }
        
        nav {
            display: flex;
            gap: 2rem;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.3s;
        }
        
        nav a:hover {
            opacity: 0.8;
        }
        
        .page {
            display: none;
            min-height: 100vh;
            padding: 2rem 5%;
        }
        
        .page.active {
            display: block;
        }
        
        .hero {
            text-align: center;
            padding: 4rem 0;
        }
        
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            margin-bottom: 1rem;
            color: var(--dark-brown);
        }
        
        .hero img {
            max-width: 100%;
            border-radius: 8px;
            margin: 2rem 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 3rem;
            color: var(--brown);
        }
        
        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        
        .history-card {
            background-color: var(--brown);
            color: white;
            padding: 2rem;
            border-radius: 8px;
        }
        
        .btn {
            background-color: var(--brown);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            margin: 1rem 0;
        }
        
        .btn:hover {
            background-color: #5C4A4A;
            transform: translateY(-3px);
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: var(--brown);
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            z-index: 200;
            font-size: 0.95rem;
        }
        
        /* Nova página de Login */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        
        .login-box {
            background: white;
            padding: 3rem 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        
        .login-box h1 {
            font-family: 'Playfair Display', serif;
            color: var(--brown);
            margin-bottom: 1.5rem;
        }
        
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border 0.3s;
        }
        
        input:focus, select:focus {
            border-color: var(--brown);
            outline: none;
        }
        
        .role-options {
            display: flex;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        
        .role-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--brown);
            background: white;
            color: var(--brown);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .role-btn.active {
            background: var(--brown);
            color: white;
        }
        
        .success-msg {
            color: #28a745;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Página 1: Início -->
    <div id="page1" class="page active">
        <header>
            <div class="logo">PRAIA BUS</div>
            <nav>
                <a href="#" onclick="navigateTo('page1')">Início</a>
                <a href="#" onclick="navigateTo('page2')">Menu</a>
                <a href="#" onclick="navigateTo('page3')">Sobre Nós</a>
                <a href="#" onclick="navigateTo('page4')">Avaliações</a>
                <a href="#" onclick="navigateTo('page6')">Destinos</a>
            </nav>
            <!-- Botão transformado -->
            <button onclick="navigateTo('page7')" class="btn" 
                    style="background-color: white; color: var(--brown); padding: 10px 24px; font-weight: bold; border: none;">
                VOCÊ É?
            </button>
        </header>
        
        <div class="hero">
            <h1>BEM-VINDO A SUA<br><span style="font-style: italic; font-size: 3.8rem;">Futura Viagem</span></h1>
            <img src="https://picsum.photos/id/1015/800/400" alt="Praia paradisíaca" style="max-width: 800px;">
            <div style="margin-top: 2rem; background-color: var(--brown); color: white; padding: 1rem; display: inline-block; font-weight: bold;">
                CRIADO POR: BERNARDO FARIA
            </div>
        </div>
        
        <div style="text-align: center; margin: 3rem 0;">
            <a href="#" onclick="navigateTo('page3')" class="btn">CONHEÇA NOSSO TRABALHO</a>
        </div>
    </div>

    <!-- ... (outras páginas mantidas iguais: page2, page3, page4, page5, page6) ... -->

    <!-- Nova Página 7: Você É? / Login -->
    <div id="page7" class="page">
        <a href="#" onclick="navigateTo('page1')" class="back-btn">← Voltar ao Início</a>
        
        <div class="login-page">
            <div class="login-box">
                <h1>Você é?</h1>
                <p style="margin-bottom: 2rem; color: #555;">Faça login para continuar</p>
                
                <div class="role-options">
                    <button class="role-btn active" onclick="selectRole(this)">Passageiro</button>
                    <button class="role-btn" onclick="selectRole(this)">Parceiro / Motorista</button>
                </div>
                
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com">
                </div>
                
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="senha" placeholder="••••••••">
                </div>
                
                <button onclick="fazerLogin()" class="btn" style="width: 100%; padding: 16px; font-size: 1.1rem;">
                    ENTRAR
                </button>
                
                <p style="margin-top: 1.5rem; font-size: 0.95rem;">
                    Não tem conta? <a href="#" style="color: var(--brown); text-decoration: underline;">Cadastre-se</a>
                </p>
                
                <div id="successMsg" class="success-msg">
                    ✅ Login realizado com sucesso!
                </div>
            </div>
        </div>
    </div>

    <script>
        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0, 0);
        }

        function selectRole(btn) {
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function fazerLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            if (email && senha) {
                document.getElementById('successMsg').style.display = 'block';
                setTimeout(() => {
                    alert('Login realizado com sucesso! 🎉\nBem-vindo ao Praia Bus.');
                    navigateTo('page1');
                }, 1500);
            } else {
                alert('Por favor, preencha o e-mail e a senha.');
            }
        }

        // Tecla Escape volta para a página inicial
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") {
                navigateTo('page1');
            }
        });
        
        console.log('%cSite Praia Bus atualizado com sucesso!', 'color: #e67e22; font-size: 14px;');
    </script>
</body>
</html>
